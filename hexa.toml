# hexa.toml — hexa-earth standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-earth
# Provenance: extracted 2026-05-06 from n6-architecture/domains/infra/
#             at SHA c0f1f570 (sister to hexa-bio, hexa-energy).

[package]
name = "hexa-earth"
version = "1.0.0"
entry = "cli/hexa-earth.hexa"
description = "Earth Substrate (HEXA family): 12-verb integrated bundle across 4 groups — climate (climate, carbon_capture, env_thermal, env_protect) + water (desal, desalination, water_treat) + geo (geology, earthquake, cartography) + defense (earth_defense, hexa_defense). Spec-first; working .hexa CLI TBD. safety/civil verbs are deferred to a future hexa-safety standalone."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/hexa-earth"
homepage = "https://github.com/need-singularity/hexa-earth"
readme = "README.md"
keywords = ["earth-substrate", "hexa-family", "climate", "water", "geo", "defense", "n6-invariant"]
categories = ["geosciences", "climate-science", "earth-systems", "planetary-defense"]

[[bin]]
name = "hexa-earth"
path = "cli/hexa-earth.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager (hexa-lang) at install time.
[scripts]
install = "install.hexa"

# ── Verb manifest (12 verbs / 4 groups) ───────────────────
[modules.climate_group]
verbs = ["climate", "carbon_capture", "env_thermal", "env_protect"]

[modules.water_group]
verbs = ["desal", "desalination", "water_treat"]

[modules.geo_group]
verbs = ["geology", "earthquake", "cartography"]

[modules.defense_group]
verbs = ["earth_defense", "hexa_defense"]

# ── Dependencies ───────────────────────────────────────────
[dependencies]
hexa-lang = ">=1.0.0"

# ── Closure provenance (raw#10 honest C3) ─────────────────
[closure]
verbs_total = 12
groups_total = 4
verdict = "SPEC_FIRST"
extracted_from = "n6-architecture/domains/infra/ @ c0f1f570 (2026-05-06)"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "12-verb integrated Earth substrate across 4 groups (climate + water + geo + defense). Spec-first packaging — working .hexa CLI is TBD; this v1.0.0 ships the canonical extraction of source specs, not empirical sandboxes."
not_scope = ["working .hexa CLI implementations (TBD per verb)", "safety/civil verbs (deferred to future hexa-safety standalone)", "live earth-observation data pipelines", "operational defense systems (peaceful-only scope inherited from upstream)"]

# ── Cross-link sister substrates ──────────────────────────
[cross_link]
sister = ["need-singularity/hexa-bio", "need-singularity/hexa-energy"]
note = "hexa-energy is the climate cousin (energy↔climate co-design); hexa-bio is the molecular sister."

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (spec-only browse; no compute pipelines wired)"
